{% extends 'mfc/base.html' %}

{% block title %}Вход в систему{% endblock %}

{% block content %}
<section style="max-width: 400px; margin: 20px auto;">
    <h2 style="text-align: center;">Вход в систему</h2>

    <div class="card">
        {% if form.errors %}
            <div class="alert alert-error">
                <p>Неверное имя пользователя или пароль. Пожалуйста, попробуйте снова.</p>
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Имя пользователя:</label>
                <input type="text" name="username" id="id_username" class="form-control" required autofocus>
            </div>
            <div class="form-group">
                <label for="id_password">Пароль:</label>
                <input type="password" name="password" id="id_password" class="form-control" required>
            </div>
            <div style="text-align: center; margin-top: 20px;">
                <button type="submit" class="btn btn-success" style="padding: 10px 30px;">Войти</button>
            </div>
            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </div>
</section>
{% endblock %}
